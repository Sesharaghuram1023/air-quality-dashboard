<!DOCTYPE html>
<html>
<head>
<title>Air Quality Dashboard</title>

<style>
body {
  font-family: Arial;
  background-color: #0f172a;
  color: white;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 20px auto;
  width: 200px;
  border-radius: 10px;
}

.value {
  font-size: 30px;
}
</style>

</head>

<body>

<h1>🌐 Air Quality Dashboard</h1>

<div class="card">
  <h3>Temperature</h3>
  <div class="value">25°C</div>
</div>

<div class="card">
  <h3>Humidity</h3>
  <div class="value">60%</div>
</div>

<div class="card">
  <h3>MQ135</h3>
  <div class="value">120</div>
</div>

<div class="card">
  <h3>MQ7</h3>
  <div class="value">75</div>
</div>

</body>
</html>
