<!DOCTYPE html>
<html>
<head>
  <title>Air Quality Dashboard</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      color: cyan;
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 50px;
    }

    .card {
      background: #222;
      padding: 30px;
      border-radius: 15px;
      width: 200px;
      box-shadow: 0 0 10px rgba(0,255,255,0.3);
    }

    .value {
      font-size: 24px;
      margin-top: 10px;
      color: lime;
    }
  </style>
</head>

<body>

<h1>🌍 Air Quality Dashboard</h1>

<div class="container">

  <div class="card">
    <h2>Temperature</h2>
    <div id="temp" class="value">-- °C</div>
  </div>

  <div class="card">
    <h2>Humidity</h2>
    <div id="hum" class="value">-- %</div>
  </div>

</div>

<!-- 🔥 Firebase Script -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVCi2nIj1Ru2FUZLCRCi68H0gyhEWmduQ",
  databaseURL: "https://air-quality-dashboard-d0c3b-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 Temperature
const tempRef = ref(db, "sensor/temperature");
onValue(tempRef, (snapshot) => {
  const data = snapshot.val();
  if (data !== null) {
    document.getElementById("temp").innerText = data + " °C";
  }
});

// 🔥 Humidity
const humRef = ref(db, "sensor/humidity");
onValue(humRef, (snapshot) => {
  const data = snapshot.val();
  if (data !== null) {
    document.getElementById("hum").innerText = data + " %";
  }
});
</script>

</body>
</html>
