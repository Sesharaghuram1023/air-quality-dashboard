<!DOCTYPE html>
<html>
<head>
  <title>Air Dashboard</title>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial;
    }

    header {
      text-align: center;
      padding: 10px;
      background: #1e293b;
      position: relative;
    }

    #clock {
      position: absolute;
      right: 15px;
      top: 10px;
      color: lime;
    }

    .main {
      display: flex;
    }

    /* LEFT PANEL */
    .left {
      width: 250px;
      background: #1e293b;
      padding: 15px;
    }

    .left input, .left button {
      width: 100%;
      margin-top: 5px;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    .left button {
      background: cyan;
      cursor: pointer;
    }

    /* RIGHT SIDE */
    .right {
      flex: 1;
      padding: 20px;
    }

    /* SENSOR GRID */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .value {
      font-size: 22px;
      color: #22c55e;
    }

    /* GRAPH GRID */
    .graphs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 20px;
    }

    canvas {
      width: 100% !important;
      height: 250px !important;
      background: white;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>🌍 Air Quality Dashboard</h2>
  <div id="clock"></div>
</header>

<div class="main">

  <!-- LEFT -->
  <div class="left">
    <h3>📥 Download</h3>
    <input type="date" id="fromDate">
    <input type="date" id="toDate">
    <button onclick="downloadData()">Download CSV</button>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <!-- SENSOR BOXES -->
    <div class="cards">

      <div class="card">
        <h3>Temperature</h3>
        <div id="temp" class="value">--</div>
      </div>

      <div class="card">
        <h3>Humidity</h3>
        <div id="hum" class="value">--</div>
      </div>

      <div class="card">
        <h3>MQ135</h3>
        <div id="mq135" class="value">--</div>
      </div>

      <div class="card">
        <h3>MQ7</h3>
        <div id="mq7" class="value">--</div>
      </div>

    </div>

    <!-- GRAPH BOXES -->
    <div class="graphs">

      <div class="card">
        <h4>Temperature Graph</h4>
        <canvas id="chart1"></canvas>
      </div>

      <div class="card">
        <h4>Humidity Graph</h4>
        <canvas id="chart2"></canvas>
      </div>

      <div class="card">
        <h4>MQ135 Graph</h4>
        <canvas id="chart3"></canvas>
      </div>

      <div class="card">
        <h4>MQ7 Graph</h4>
        <canvas id="chart4"></canvas>
      </div>

    </div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// Firebase config
var firebaseConfig = {
  apiKey: "AIzaSyAVCi2nIj1Ru2FUZLCRCi68H0gyhEWmduQ",
  databaseURL: "https://air-quality-dashboard-d0c3b-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
},1000);

// CREATE CHART FUNCTION
function createChart(id,label){
  return new Chart(document.getElementById(id), {
    type:'line',
    data:{
      labels:[],
      datasets:[{
        label: label,
        data: []
      }]
    }
  });
}

// CREATE 4 CHARTS
let chart1 = createChart("chart1","Temp");
let chart2 = createChart("chart2","Humidity");
let chart3 = createChart("chart3","MQ135");
let chart4 = createChart("chart4","MQ7");

// UPDATE CHART
function updateChart(chart,value){
  chart.data.labels.push(new Date().toLocaleTimeString());
  chart.data.datasets[0].data.push(value);
  chart.update();
}

// FIREBASE DATA
db.ref("sensor/temperature").on("value", s=>{
  let v=s.val();
  document.getElementById("temp").innerText=v+" °C";
  updateChart(chart1,v);
});

db.ref("sensor/humidity").on("value", s=>{
  let v=s.val();
  document.getElementById("hum").innerText=v+" %";
  updateChart(chart2,v);
});

db.ref("sensor/mq135").on("value", s=>{
  let v=s.val();
  document.getElementById("mq135").innerText=v;
  updateChart(chart3,v);
});

db.ref("sensor/mq7").on("value", s=>{
  let v=s.val();
  document.getElementById("mq7").innerText=v;
  updateChart(chart4,v);
});

// DOWNLOAD
function downloadData(){
  alert("Download feature works with logged data (already implemented earlier).");
}

</script>

</body>
</html>
