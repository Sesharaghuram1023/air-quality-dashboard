<!DOCTYPE html>
<html>
<head>
  <title>Smart Air Dashboard</title>

  <style>
    body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial;
  overflow: hidden; /* 🚀 NO SCROLL */
}

.main {
  display: flex;
  height: 100vh; /* full screen */
}

/* LEFT PANEL */
.left {
  width: 220px;
  background: #1e293b;
  padding: 10px;
}

/* RIGHT PANEL */
.right {
  flex: 1;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* SENSOR BOXES */
.cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

/* GRAPHS */
.graphs {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  flex: 1;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

/* GRAPH SIZE */
canvas {
  width: 100% !important;
  height: 150px !important; /* 👈 smaller graphs */
  background: white;
  border-radius: 10px;
}

/* ALERT */
.alert {
  text-align: center;
  font-size: 16px;
}
  </style>
</head>

<body>

<header>
  <h2>SAFETY ALERT SYSTEM AND MONITOR</h2>
  <div id="clock"></div>
</header>

<div class="main">

  <!-- LEFT -->
  <div class="left">
    <h3>📥 Download</h3>
    <input type="date">
    <input type="date">
    <button>Download</button>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <!-- SENSOR BOXES -->
    <div class="cards">

      <div class="card">
        <h3>🌡 Temp</h3>
        <div id="temp" class="value">--</div>
      </div>

      <div class="card">
        <h3>💧 Humidity</h3>
        <div id="hum" class="value">--</div>
      </div>

      <div class="card">
        <h3>🌫 MQ135</h3>
        <div id="mq135" class="value">--</div>
      </div>

      <div class="card">
        <h3>🔥 MQ7</h3>
        <div id="mq7" class="value">--</div>
      </div>

    </div>

    <!-- ALERT -->
    <div id="alert" class="alert">Status: Normal</div>

    <!-- GRAPHS -->
    <div class="graphs">

      <canvas id="chart1"></canvas>
      <canvas id="chart2"></canvas>
      <canvas id="chart3"></canvas>
      <canvas id="chart4"></canvas>

    </div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

var firebaseConfig = {
  apiKey: "AIzaSyAVCi2nIj1Ru2FUZLCRCi68H0gyhEWmduQ",
  databaseURL: "https://air-quality-dashboard-d0c3b-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
},1000);

// GRAPH FUNCTION
function createChart(id,label,color){
  return new Chart(document.getElementById(id), {
    type:'line',
    data:{
      labels:[],
      datasets:[{
        label: label,
        borderColor: color,
        backgroundColor: color,
        data: [],
        fill:false,
        tension:0.4
      }]
    },
    options:{
      animation:true,
      plugins:{ legend:{ display:true } }
    }
  });
}

// CREATE COLORFUL GRAPHS
let c1=createChart("chart1","Temp","red");
let c2=createChart("chart2","Humidity","blue");
let c3=createChart("chart3","MQ135","orange");
let c4=createChart("chart4","MQ7","green");

// LIMIT GRAPH SIZE
function updateChart(chart,value){
  chart.data.labels.push(new Date().toLocaleTimeString());
  chart.data.datasets[0].data.push(value);

  if(chart.data.labels.length > 20){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
}

// FIREBASE
db.ref("sensor/temperature").on("value", s=>{
  let v=s.val();
  document.getElementById("temp").innerText=v+" °C";
  updateChart(c1,v);
});

db.ref("sensor/humidity").on("value", s=>{
  let v=s.val();
  document.getElementById("hum").innerText=v+" %";
  updateChart(c2,v);
});

db.ref("sensor/mq135").on("value", s=>{
  let v=s.val();
  document.getElementById("mq135").innerText=v;
  updateChart(c3,v);
});

db.ref("sensor/mq7").on("value", s=>{
  let v=s.val();
  document.getElementById("mq7").innerText=v;
  updateChart(c4,v);

  // ALERT
  let msg="Normal", color="lightgreen";

  if(v>300){
    msg="🚨 HIGH CO LEVEL!";
    color="red";
  } else if(v>200){
    msg="⚠ MEDIUM CO";
    color="orange";
  }

  let el=document.getElementById("alert");
  el.innerText=msg;
  el.style.color=color;
});

</script>

</body>
</html>
