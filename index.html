<!DOCTYPE html>
<html>
<head>
  <title>Smart Air Dashboard</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg,#0f172a,#1e3a8a);
      color: white;
      font-family: Arial;
    }

    header {
      padding: 10px;
      background: #0f172a;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo {
      position: absolute;
      left: 15px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      box-shadow: 0 0 15px cyan;
    }

    #clock {
      position: absolute;
      right: 15px;
      color: lime;
    }

    .main {
      display: flex;
    }

    .left {
      width: 260px;
      background: rgba(30,41,59,0.9);
      padding: 20px;
    }

    .left input, .left button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    .left button {
      background: cyan;
      font-weight: bold;
      cursor: pointer;
    }

    .status {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
    }

    .right {
      flex: 1;
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 20px;
    }

    .card {
      background: rgba(30,41,59,0.9);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .value {
      font-size: 26px;
      font-weight: bold;
    }

    .graphs {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 20px;
      margin-top: 20px;
    }

    canvas {
      background: white;
      border-radius: 10px;
    }

    .alert {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h2>SAFETY ALERT SYSTEM AND MONITOR</h2>
  <div id="clock"></div>
</header>

<div class="main">

  <div class="left">
    <h3>📥 Download</h3>

    <input type="date" id="startDate">
    <input type="date" id="endDate">

    <button onclick="downloadData()">Download</button>

    <div id="status" class="status">🔴 Checking...</div>
  </div>

  <div class="right">

    <div class="cards">
      <div class="card">
        <h3>🌡 Temp</h3>
        <div id="temp" class="value">--</div>
      </div>

      <div class="card">
        <h3>💧 Humidity</h3>
        <div id="hum" class="value">--</div>
      </div>

      <div class="card">
        <h3>🌫 MQ135</h3>
        <div id="mq135" class="value">--</div>
      </div>

      <div class="card">
        <h3>🔥 MQ7</h3>
        <div id="mq7" class="value">--</div>
      </div>
    </div>

    <div id="alert" class="alert">Waiting for Data...</div>

    <div class="graphs">
      <canvas id="chart1"></canvas>
      <canvas id="chart2"></canvas>
      <canvas id="chart3"></canvas>
      <canvas id="chart4"></canvas>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

var firebaseConfig = {
  apiKey: "AIzaSyAVCi2nIj1Ru2FUZLCRCi68H0gyhEWmduQ",
  databaseURL: "https://air-quality-dashboard-d0c3b-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
},1000);

// WIFI STATUS CHECK
setInterval(()=>{
  db.ref("sensor").once("value")
  .then(s=>{
    if(s.exists()){
      document.getElementById("status").innerText="🟢 Connected";
    } else {
      document.getElementById("status").innerText="🔴 No Data";
    }
  })
  .catch(()=>{
    document.getElementById("status").innerText="❌ Error";
  });
},3000);

// CHART
function createChart(id,label,color){
  return new Chart(document.getElementById(id), {
    type:'line',
    data:{
      labels:[],
      datasets:[{
        label: label,
        borderColor: color,
        data: [],
        tension:0.4
      }]
    }
  });
}

let c1=createChart("chart1","Temp","red");
let c2=createChart("chart2","Humidity","blue");
let c3=createChart("chart3","MQ135","orange");
let c4=createChart("chart4","MQ7","green");

function updateChart(chart,value){
  chart.data.labels.push(new Date().toLocaleTimeString());
  chart.data.datasets[0].data.push(value || 0);

  if(chart.data.labels.length > 20){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
}

// LIVE DATA
db.ref("sensor/temperature").on("value", s=>{
  let v=s.val()||0;
  document.getElementById("temp").innerText=v+" °C";
  updateChart(c1,v);
});

db.ref("sensor/humidity").on("value", s=>{
  let v=s.val()||0;
  document.getElementById("hum").innerText=v+" %";
  updateChart(c2,v);
});

db.ref("sensor/mq135").on("value", s=>{
  let v=s.val()||0;
  document.getElementById("mq135").innerText=v;
  updateChart(c3,v);
});

db.ref("sensor/mq7").on("value", s=>{
  let v=s.val()||0;
  document.getElementById("mq7").innerText=v;
  updateChart(c4,v);

  let msg="Normal", color="lightgreen";

  if(v>300){
    msg="🚨 HIGH CO LEVEL!";
    color="red";
  } else if(v>200){
    msg="⚠ MEDIUM CO";
    color="orange";
  }

  let el=document.getElementById("alert");
  el.innerText=msg;
  el.style.color=color;
});

// DOWNLOAD WITH DATE + TIME
function downloadData(){
  let start = document.getElementById("startDate").value;
  let end = document.getElementById("endDate").value;

  if(!start || !end){
    alert("Select dates");
    return;
  }

  db.ref("sensor").once("value", snapshot=>{
    let d = snapshot.val();

    let now = new Date();

    let csv = "Date,Time,Temperature,Humidity,MQ135,MQ7\n";
    csv += `${now.toLocaleDateString()},${now.toLocaleTimeString()},${d.temperature},${d.humidity},${d.mq135},${d.mq7}`;

    let blob = new Blob([csv], {type:"text/csv"});
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "sensor_data.csv";
    a.click();
  });
}

</script>

</body>
</html>
