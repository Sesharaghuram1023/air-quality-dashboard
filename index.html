<!DOCTYPE html>
<html>
<head>
  <title>Air Quality Dashboard</title>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: #00ffc3;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      width: 200px;
      box-shadow: 0 0 15px rgba(0,255,200,0.3);
    }

    .value {
      font-size: 28px;
      margin-top: 10px;
      color: #22c55e;
    }

    .warning {
      margin-top: 30px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>🌍 Air Quality Dashboard</h1>

<div class="container">

  <div class="card">
    <h2>Temperature</h2>
    <div id="temp" class="value">-- °C</div>
  </div>

  <div class="card">
    <h2>Humidity</h2>
    <div id="hum" class="value">-- %</div>
  </div>

</div>

<div id="status" class="warning">Status: Waiting...</div>

<!-- 🔥 Firebase v8 (no module issues) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // 🔥 YOUR FIREBASE CONFIG
  var firebaseConfig = {
    apiKey: "AIzaSyAVCi2nIj1Ru2FUZLCRCi68H0gyhEWmduQ",
    databaseURL: "https://air-quality-dashboard-d0c3b-default-rtdb.firebaseio.com",
  };

  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();

  // 🌡 Temperature
  db.ref("sensor/temperature").on("value", function(snapshot) {
    var temp = snapshot.val();
    if (temp !== null) {
      document.getElementById("temp").innerText = temp + " °C";
    }
  });

  // 💧 Humidity
  db.ref("sensor/humidity").on("value", function(snapshot) {
    var hum = snapshot.val();
    if (hum !== null) {
      document.getElementById("hum").innerText = hum + " %";
    }
  });

  // 🚨 Simple Status Logic
  db.ref("sensor/temperature").on("value", function(snapshot) {
    var temp = snapshot.val();
    var status = "Normal";
    var color = "lightgreen";

    if (temp > 35) {
      status = "⚠ HIGH TEMPERATURE";
      color = "red";
    } else if (temp > 30) {
      status = "⚠ MEDIUM TEMPERATURE";
      color = "orange";
    }

    var el = document.getElementById("status");
    el.innerText = "Status: " + status;
    el.style.color = color;
  });
</script>

</body>
</html>
