<!DOCTYPE html>
<html>
<head>
  <title>Smart Air Dashboard</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg,#0f172a,#1e3a8a);
      color: white;
      font-family: Arial;
    }

    header {
      padding: 15px;
      background: #0f172a;
      text-align: center;
      position: relative;
    }

    .logo {
      position: absolute;
      left: 15px;
      top: 10px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      box-shadow: 0 0 10px cyan;
    }

    #clock {
      position: absolute;
      right: 20px;
      top: 20px;
      color: lime;
    }

    .container {
      display: flex;
      max-width: 1400px;
      margin: auto;
    }

    .left {
      width: 260px;
      background: rgba(30,41,59,0.9);
      padding: 20px;
      border-radius: 10px;
      margin: 15px;
    }

    .left input, .left button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    .left button {
      background: cyan;
      font-weight: bold;
      cursor: pointer;
    }

    .status {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    .right {
      flex: 1;
      margin: 15px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 20px;
    }

    .card {
      background: rgba(30,41,59,0.9);
      padding: 25px;
      border-radius: 12px;
      text-align: center;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .graphs {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 20px;
      margin-top: 20px;
    }

    canvas {
      width: 100% !important;
      height: 300px !important;
      background: white;
      border-radius: 10px;
    }

    @media(max-width:1000px){
      .container{ flex-direction: column; }
      .graphs{ grid-template-columns: 1fr; }
      .cards{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h2>SAFETY ALERT SYSTEM AND MONITOR</h2>
  <div id="clock"></div>
</header>

<div class="container">

  <div class="left">
    <h3>📥 Download</h3>

    <input type="date" id="startDate">
    <input type="date" id="endDate">

    <button onclick="downloadData()">Download</button>

    <div id="status" class="status">🔴 Checking...</div>
  </div>

  <div class="right">

    <div class="cards">
      <div class="card">
        <h3>🌡 Temp</h3>
        <div id="temp" class="value">--</div>
      </div>

      <div class="card">
        <h3>💧 Humidity</h3>
        <div id="hum" class="value">--</div>
      </div>

      <div class="card">
        <h3>🌫 MQ135</h3>
        <div id="mq135" class="value">--</div>
      </div>

      <div class="card">
        <h3>🔥 MQ7</h3>
        <div id="mq7" class="value">--</div>
      </div>
    </div>

    <div class="graphs">
      <canvas id="chart1"></canvas>
      <canvas id="chart2"></canvas>
      <canvas id="chart3"></canvas>
      <canvas id="chart4"></canvas>
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

var firebaseConfig = {
  apiKey: "AIzaSyAVCi2nIj1Ru2FUZLCRCi68H0gyhEWmduQ",
  databaseURL: "https://air-quality-dashboard-d0c3b-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
},1000);

// CHART
function createChart(id,label,color){
  return new Chart(document.getElementById(id), {
    type:'line',
    data:{
      labels:[],
      datasets:[{
        label: label,
        borderColor: color,
        data: [],
        tension:0.4
      }]
    }
  });
}

let c1=createChart("chart1","Temp","red");
let c2=createChart("chart2","Humidity","blue");
let c3=createChart("chart3","MQ135","orange");
let c4=createChart("chart4","MQ7","green");

function updateChart(chart,value){
  chart.data.labels.push(new Date().toLocaleTimeString());
  chart.data.datasets[0].data.push(value);

  if(chart.data.labels.length>20){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }
  chart.update();
}

// WIFI DETECTION
let lastUpdateTime = Date.now();

// DATA LISTENER
db.ref("sensor").on("value", s=>{
  let d = s.val();
  if(!d) return;

  lastUpdateTime = Date.now();

  document.getElementById("temp").innerText=d.temperature+" °C";
  document.getElementById("hum").innerText=d.humidity+" %";
  document.getElementById("mq135").innerText=d.mq135;
  document.getElementById("mq7").innerText=d.mq7;

  updateChart(c1,d.temperature);
  updateChart(c2,d.humidity);
  updateChart(c3,d.mq135);
  updateChart(c4,d.mq7);
});

// STATUS CHECK
setInterval(()=>{
  let now = Date.now();

  if(now - lastUpdateTime < 5000){
    document.getElementById("status").innerText = "🟢 WiFi Connected";
  } else {
    document.getElementById("status").innerText = "🔴 WiFi Disconnected";
  }
},2000);

// DOWNLOAD
function downloadData(){
  db.ref("sensor").once("value", snap=>{
    let d=snap.val();
    if(!d){
      alert("No data");
      return;
    }

    let now=new Date();

    let csv="Date,Time,Temp,Humidity,MQ135,MQ7\n";
    csv+=`${now.toLocaleDateString()},${now.toLocaleTimeString()},${d.temperature},${d.humidity},${d.mq135},${d.mq7}`;

    let blob=new Blob([csv]);
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="data.csv";
    a.click();
  });
}

</script>

</body>
</html>
