<!DOCTYPE html>
<html>
<head>
  <title>Air Quality Dashboard</title>
  <style>
    body { font-family: Arial; text-align: center; background:#111; color:#fff; }
    .box { display:inline-block; margin:10px; padding:20px; border-radius:10px; background:#222; }
    h1 { color:#00ffc3; }
  </style>
</head>
<body>

<h1>🌍 Air Quality Dashboard</h1>

<div class="box">
  <h2>Temperature</h2>
  <p id="temp">-- °C</p>
</div>

<div class="box">
  <h2>Humidity</h2>
  <p id="hum">-- %</p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // 🔥 YOUR FIREBASE CONFIG (same as you copied before)
  var firebaseConfig = {
    apiKey: "AIzaSyAVCi2nIj1Ru2FUZLCRCi68H0gyhEWmduQ",
    authDomain: "air-quality-dashboard-d0c3b.firebaseapp.com",
    databaseURL: "https://air-quality-dashboard-d0c3b-default-rtdb.firebaseio.com",
    projectId: "air-quality-dashboard-d0c3b",
  };

  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();

  // 🔹 Read Temperature
  db.ref("/sensor/temperature").on("value", (snap) => {
    document.getElementById("temp").innerHTML = snap.val() + " °C";
  });

  // 🔹 Read Humidity
  db.ref("/sensor/humidity").on("value", (snap) => {
    document.getElementById("hum").innerHTML = snap.val() + " %";
  });
</script>

</body>
</html>
